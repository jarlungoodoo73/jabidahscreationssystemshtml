title: "Ideas and Feedback"
labels: ["idea", "feedback"]
body: |
  ## Guidelines

  Please familiarize yourself with our [Code of Conduct](https://whatwg.org/code-of-conduct), [FAQ](https://whatwg.org/faq), and [Working Mode](https://whatwg.org/working-mode) before sharing ideas.

  For formal feature proposals, please use the "New feature" issue template instead.

  ## Your Idea

  **What's your idea or feedback?**

  **How would it benefit web developers or users?**

  **Any examples or use cases?**